<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caro AI - Master Edition</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f172a%22/><text y=%22.9em%22 font-size=%2280%22 x=%225%22 fill=%22%2338bdf8%22>X</text><text y=%22.9em%22 font-size=%2260%22 x=%2250%22 fill=%22%23ef4444%22>O</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg: #0b1120; --panel: rgba(30, 41, 59, 0.8); --text: #f1f5f9;
            --cell: #1e293b; --accent: #38bdf8; --player: #4ade80; --ai: #f87171;
            --border: rgba(255,255,255,0.1);
        }
        [data-theme="light"] {
            --bg: #f8fafc; --panel: rgba(255,255,255,0.9); --text: #0f172a;
            --cell: #ffffff; --accent: #0284c7; --player: #16a34a; --ai: #dc2626;
            --border: rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            transition: 0.3s; touch-action: manipulation;
        }

        .nav { width: 100%; max-width: 500px; display: flex; justify-content: space-between; padding: 15px; box-sizing: border-box; }
        
        .stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; max-width: 500px;
            background: var(--panel); padding: 15px; border-radius: 20px; border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 10px;
        }
        .stat-item { text-align: center; }
        .val { font-size: 1.4rem; font-weight: 800; color: var(--accent); display: block; }
        .lab { font-size: 0.7rem; opacity: 0.6; text-transform: uppercase; font-weight: bold; }

        .leaderboard { font-size: 0.8rem; margin-bottom: 15px; color: var(--accent); font-weight: bold; }

        .board-container { width: 96vw; max-width: 480px; aspect-ratio: 1/1; }
        #board {
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            gap: 2px; background: var(--border); padding: 5px; border-radius: 12px; height: 100%;
        }

        .cell {
            background: var(--cell); display: flex; align-items: center; justify-content: center;
            font-size: clamp(14px, 4vw, 24px); font-weight: 900; cursor: pointer; border-radius: 3px;
        }
        .cell.x { color: var(--player); }
        .cell.o { color: var(--ai); }

        .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; padding-bottom: 30px; }
        .btn {
            padding: 10px 20px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; gap: 5px; font-size: 0.9rem;
        }
        .btn-main { background: var(--accent); color: white; }
        .btn-sec { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: #7f1d1d; color: white; }
        .btn:active { transform: scale(0.95); }

        .win-glow { background: var(--player) !important; color: white !important; animation: blink 0.5s infinite alternate; }
        @keyframes blink { from { opacity: 0.6; } to { opacity: 1; } }
    </style>
</head>
<body data-theme="dark">

    <div class="nav">
        <div style="font-weight: 900; letter-spacing: 1px;">CARO <span style="color:var(--accent)">MASTER</span></div>
        <button class="btn btn-sec" style="padding: 5px 12px;" onclick="toggleTheme()">🌓</button>
    </div>
    
    <div class="stats">
        <div class="stat-item"><span class="lab">Cấp độ hiện tại</span><span id="ai-level" class="val">1</span></div>
        <div class="stat-item"><span class="lab">Số trận thắng</span><span id="win-count" class="val">0</span></div>
    </div>

    <div id="best-record" class="leaderboard">Kỷ lục: Level 1 - 0 Win</div>

    <div id="status" style="margin-bottom: 10px; font-size: 0.9rem; font-weight: bold; color: var(--player);">Lượt của bạn</div>

    <div class="board-container">
        <div id="board"></div>
    </div>

    <div class="controls">
        <button class="btn btn-sec" onclick="undo()">↩ Undo</button>
        <button class="btn btn-main" onclick="init()">🎮 Ván Mới</button>
        <button class="btn btn-danger" onclick="resetAll()">🔥 Reset All</button>
    </div>

    <script>
        const S = 15; let board = [], over = false, wins = 0, level = 1, history = [];
        const audio = new (window.AudioContext || window.webkitAudioContext)();

        function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
        function beep(f, d) { 
            let o = audio.createOscillator(), g = audio.createGain();
            o.frequency.value = f; g.gain.value = 0.05;
            o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + d);
        }

        function loadRecord() {
            const bestL = localStorage.getItem('bestL') || 1;
            const bestW = localStorage.getItem('bestW') || 0;
            document.getElementById('best-record').innerText = `Kỷ lục cao nhất: Level ${bestL} — ${bestW} Win`;
        }

        function saveRecord() {
            const bestL = localStorage.getItem('bestL') || 0;
            if (level > bestL) { localStorage.setItem('bestL', level); localStorage.setItem('bestW', wins); }
            loadRecord();
        }

        function resetAll() {
            if(confirm("Bạn muốn xóa sạch kỷ lục và bắt đầu lại từ Level 1?")) {
                localStorage.clear(); wins = 0; level = 1; updateUI(); init(); loadRecord();
            }
        }

        function init() {
            board = Array(S).fill().map(() => Array(S).fill(''));
            history = []; over = false; document.getElementById('status').innerText = "Lượt của bạn (X)";
            const bEl = document.getElementById('board'); bEl.innerHTML = '';
            for (let r = 0; r < S; r++) {
                for (let c = 0; c < S; c++) {
                    const el = document.createElement('div'); el.className = 'cell';
                    el.onclick = () => play(r, c); bEl.appendChild(el);
                    board[r][c] = { v: '', el: el };
                }
            }
        }

        function play(r, c) {
            if (board[r][c].v !== '' || over) return;
            set(r, c, 'X'); history.push({r, c, p: 'X'}); beep(600, 0.05);
            if (check(r, c, 'X')) { win(); return; }
            
            over = true; document.getElementById('status').innerText = "AI đang suy nghĩ...";
            setTimeout(() => {
                const m = findAI(); set(m.r, m.c, 'O'); history.push({r: m.r, c: m.c, p: 'O'}); beep(400, 0.05);
                if (check(m.r, m.c, 'O')) { document.getElementById('status').innerText = "AI Thắng!"; }
                else { over = false; document.getElementById('status').innerText = "Lượt của bạn (X)"; }
            }, 400);
        }

        function set(r, c, p) { board[r][c].v = p; board[r][c].el.innerText = p; board[r][c].el.classList.add(p.toLowerCase()); }

        function undo() {
            if (history.length < 2 || over) return;
            for(let i=0; i<2; i++) {
                let l = history.pop(); board[l.r][l.c].v = ''; board[l.r][l.c].el.innerText = ''; board[l.r][l.c].el.classList.remove('x','o');
            }
            document.getElementById('status').innerText = "Đã Undo. Lượt bạn!";
        }

        function win() {
            wins++; level++; updateUI(); saveRecord();
            document.getElementById('status').innerText = "BẠN THẮNG!"; over = true;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
            beep(523, 0.2); setTimeout(()=>beep(659, 0.2), 150);
        }

        function updateUI() {
            document.getElementById('win-count').innerText = wins;
            document.getElementById('ai-level').innerText = level;
        }

        function findAI() {
            let b = -1, m = {r:7, c:7}, dw = 1.2 + (level * 0.4);
            for(let r=0; r<S; r++) for(let c=0; c<S; c++) if(board[r][c].v === '') {
                let s = score(r,c,'O') + (score(r,c,'X') * dw);
                if(s > b) { b = s; m = {r,c}; }
            }
            return m;
        }

        function score(r,c,p) {
            let t = 0, ds = [[1,0],[0,1],[1,1],[1,-1]];
            for(let [dr,dc] of ds) {
                let n = 1 + cnt(r,c,dr,dc,p) + cnt(r,c,-dr,-dc,p);
                if(n >= 5) t += 10000; else if(n === 4) t += 1000; else if(n === 3) t += 100;
            }
            return t;
        }

        function cnt(r,c,dr,dc,p) {
            let n=0, nr=r+dr, nc=c+dc;
            while(nr>=0 && nr<S && nc>=0 && nc<S && board[nr][nc].v === p) { n++; nr+=dr; nc+=dc; }
            return n;
        }

        function check(r, c, p) {
            const ds = [[1,0],[0,1],[1,1],[1,-1]];
            for(let [dr,dc] of ds) {
                let path = [[r,c]], nr=r+dr, nc=c+dc;
                while(nr>=0 && nr<S && nc>=0 && nc<S && board[nr][nc].v === p) { path.push([nr,nc]); nr+=dr; nc+=dc; }
                nr=r-dr; nc=c-dc;
                while(nr>=0 && nr<S && nc>=0 && nc<S && board[nr][nc].v === p) { path.push([nr,nc]); nr-=dr; nc-=dc; }
                if(path.length >= 5) {
                    path.forEach(pos => board[pos[0]][pos[1]].el.classList.add('win-glow')); return true;
                }
            }
            return false;
        }

        loadRecord(); init();
    </script>
</body>
</html>
