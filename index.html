<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caro Master Pro</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/566/566295.png">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/566/566295.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Caro Master">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --player-color: #22c55e;
            --ai-color: #ef4444;
            --cell-color: #1e293b; 
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            touch-action: manipulation;
        }

        .header { text-align: center; margin-top: 10px; }
        h1 { font-size: 1.8rem; margin: 10px 0; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }

        .chi-so {
            display: flex; gap: 15px; margin-bottom: 15px;
            background: var(--card-bg); padding: 12px 25px;
            border-radius: 15px; backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .o-chi-so { text-align: center; }
        .nhan { font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; }
        .gia-tri { font-size: 1.3rem; font-weight: bold; color: var(--accent-color); display: block; }

        .ky-luc { font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; font-style: italic; background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 20px; }

        #status { margin-bottom: 15px; font-weight: bold; color: var(--player-color); height: 20px; font-size: 0.95rem; }

        .ban-co-khung {
            padding: 6px; background: var(--border-color);
            border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 95vw; max-width: 450px; aspect-ratio: 1/1;
        }

        #board {
            display: grid; grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr); gap: 2px; height: 100%;
        }

        .cell {
            background-color: var(--cell-color); display: flex;
            justify-content: center; align-items: center;
            font-size: clamp(14px, 4vw, 24px); font-weight: 900;
            cursor: pointer; transition: all 0.2s ease; border-radius: 2px;
        }
        .cell:active { background-color: #334155; transform: scale(0.95); }
        .cell.x { color: var(--player-color); text-shadow: 0 0 5px rgba(34, 197, 94, 0.5); }
        .cell.o { color: var(--ai-color); text-shadow: 0 0 5px rgba(239, 68, 68, 0.5); }

        .bang-nut { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 25px; justify-content: center; width: 100%; max-width: 450px; }
        .btn {
            flex: 1; min-width: 100px;
            padding: 12px 10px; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-undo { background: #475569; color: white; }
        .btn-new { background: var(--accent-color); color: #0f172a; }
        .btn-reset { background: #7f1d1d; color: white; }
        .btn:active { transform: scale(0.9); }

        .win-cell { background-color: var(--player-color) !important; color: white !important; animation: winPulse 0.5s infinite; }
        @keyframes winPulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>CARO MASTER</h1>
    </div>

    <div class="chi-so">
        <div class="o-chi-so"><span class="nhan">Cấp độ</span><span id="ai-level" class="gia-tri">1</span></div>
        <div class="o-chi-so"><span class="nhan">Trận thắng</span><span id="win-count" class="gia-tri">0</span></div>
    </div>

    <div id="best-record" class="ky-luc">Đang tải kỷ lục...</div>

    <div id="status">Sẵn sàng chơi!</div>

    <div class="ban-co-khung">
        <div id="board"></div>
    </div>

    <div class="bang-nut">
        <button class="btn btn-undo" onclick="undoMove()">↩ ĐI LẠI</button>
        <button class="btn btn-new" onclick="initGame()">🎮 VÁN MỚI</button>
        <button class="btn btn-reset" onclick="resetAll()">🔥 XÓA HẾT</button>
    </div>

    <script>
        const SIZE = 15;
        let board = [], gameOver = false, level = 1, wins = 0, history = [];
        const audio = new (window.AudioContext || window.webkitAudioContext)();

        function beep(f, d) {
            let o = audio.createOscillator(), g = audio.createGain();
            o.frequency.value = f; g.gain.value = 0.05;
            o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + d);
        }

        function loadRecord() {
            const bl = localStorage.getItem('caro_bl') || 1;
            const bw = localStorage.getItem('caro_bw') || 0;
            document.getElementById('best-record').innerText = `🏆 Kỷ lục cao nhất: Cấp ${bl} — ${bw} trận thắng`;
        }

        function saveRecord() {
            const bl = localStorage.getItem('caro_bl') || 0;
            if (level > bl) { localStorage.setItem('caro_bl', level); localStorage.setItem('caro_bw', wins); }
            loadRecord();
        }

        function resetAll() {
            if(confirm("Xóa toàn bộ kỷ lục và chơi lại từ đầu?")) {
                localStorage.clear(); wins = 0; level = 1; 
                document.getElementById('win-count').innerText = 0;
                document.getElementById('ai-level').innerText = 1;
                initGame(); loadRecord();
            }
        }

        function initGame() {
            board = Array(SIZE).fill().map(() => Array(SIZE).fill(''));
            history = []; gameOver = false;
            document.getElementById('status').innerText = "Đến lượt bạn (X)";
            document.getElementById('status').style.color = "var(--player-color)";
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.onclick = () => handleMove(r, c);
                    boardEl.appendChild(cell);
                    board[r][c] = { val: '', el: cell };
                }
            }
        }

        function handleMove(r, c) {
            if (board[r][c].val !== '' || gameOver) return;

            makeMove(r, c, 'X');
            history.push({r, c, p: 'X'});
            beep(600, 0.05);

            if (checkWin(r, c, 'X')) {
                victory(); return;
            }

            gameOver = true;
            document.getElementById('status').innerText = "AI đang suy nghĩ...";
            document.getElementById('status').style.color = "var(--ai-color)";
            
            setTimeout(() => {
                const move = findBestMove();
                makeMove(move.r, move.c, 'O');
                history.push({r: move.r, c: move.c, p: 'O'});
                beep(400, 0.05);

                if (checkWin(move.r, move.c, 'O')) {
                    document.getElementById('status').innerText = "AI đã thắng!";
                } else {
                    gameOver = false;
                    document.getElementById('status').innerText = "Đến lượt bạn (X)";
                    document.getElementById('status').style.color = "var(--player-color)";
                }
            }, 400);
        }

        function makeMove(r, c, p) {
            board[r][c].val = p;
            board[r][c].el.innerText = p;
            board[r][c].el.classList.add(p.toLowerCase());
        }

        function undoMove() {
            if (history.length < 2 || gameOver) return;
            for(let i=0; i<2; i++) {
                let last = history.pop();
                board[last.r][last.c].val = '';
                board[last.r][last.c].el.innerText = '';
                board[last.r][last.c].el.classList.remove('x', 'o');
            }
            document.getElementById('status').innerText = "Đã lùi bước đi. Lượt bạn!";
        }

        function victory() {
            wins++; level++;
            document.getElementById('win-count').innerText = wins;
            document.getElementById('ai-level').innerText = level;
            document.getElementById('status').innerText = "BẠN ĐÃ CHIẾN THẮNG!";
            saveRecord();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 }, colors: ['#22c55e', '#38bdf8', '#ffffff'] });
            beep(523, 0.2); setTimeout(()=>beep(659, 0.2), 150);
            gameOver = true;
        }

        function findBestMove() {
            let bestScore = -1, move = {r: 7, c: 7};
            const defenseWeight = 1.3 + (level * 0.4);

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c].val === '') {
                        let score = evaluateCell(r, c, 'O') + (evaluateCell(r, c, 'X') * defenseWeight);
                        if (score > bestScore) {
                            bestScore = score; move = {r, c};
                        }
                    }
                }
            }
            return move;
        }

        function evaluateCell(r, c, p) {
            let score = 0;
            const dirs = [[1,0], [0,1], [1,1], [1,-1]];
            for (let [dr, dc] of dirs) {
                let cnt = 1 + countDir(r, c, dr, dc, p) + countDir(r, c, -dr, -dc, p);
                if (cnt >= 5) score += 10000;
                else if (cnt === 4) score += 1000;
                else if (cnt === 3) score += 100;
            }
            return score;
        }

        function countDir(r, c, dr, dc, p) {
            let cnt = 0, nr = r + dr, nc = c + dc;
            while(nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && board[nr][nc].val === p) {
                cnt++; nr += dr; nc += dc;
            }
            return cnt;
        }

        function checkWin(r, c, p) {
            const dirs = [[1,0], [0,1], [1,1], [1,-1]];
            for (let [dr, dc] of dirs) {
                let path = [[r,c]], nr = r+dr, nc = c+dc;
                while(nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && board[nr][nc].val === p) { path.push([nr,nc]); nr+=dr; nc+=dc; }
                nr = r-dr; nc = c-dc;
                while(nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && board[nr][nc].val === p) { path.push([nr,nc]); nr-=dr; nc-=dc; }
                if (path.length >= 5) {
                    path.forEach(pos => board[pos[0]][pos[1]].el.classList.add('win-cell'));
                    return true;
                }
            }
            return false;
        }

        loadRecord();
        initGame();
    </script>
</body>
</html>
